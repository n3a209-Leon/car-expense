<style>
:root{
  --bg:#14181d;
  --panel:#1c2129;
  --panel-2:#232a34;
  --line:#2c3440;
  --ink:#e8ecf1;
  --ink-dim:#8b96a5;
  --gauge-amber:#e8a33d;
  --gauge-red:#e2574c;
  --gauge-teal:#3ecf8e;
  --gauge-blue:#4f8ef7;
  --mono:'SF Mono',ui-monospace,Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'PingFang TC','Noto Sans TC',sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
  height:100%;overscroll-behavior:none;-webkit-user-select:none;user-select:none;}
#root{height:100%;display:flex;flex-direction:column;}
input,textarea{-webkit-user-select:text;user-select:text;}
::-webkit-scrollbar{display:none;}

.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:calc(env(safe-area-inset-top) + 14px) 14px 90px;}
.center-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}

/* ---- Odometer header ---- */
.odo-wrap{background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);
  border-radius:18px;padding:18px 20px;margin-bottom:16px;position:relative;overflow:hidden;}
.odo-wrap::after{content:'';position:absolute;top:-40%;right:-20%;width:180px;height:180px;
  background:radial-gradient(circle,rgba(232,163,61,.10),transparent 70%);}
.odo-label{font-size:11px;letter-spacing:.14em;color:var(--ink-dim);text-transform:uppercase;}
.odo-value{font-family:var(--mono);font-size:34px;font-weight:700;letter-spacing:.02em;margin-top:2px;
  display:flex;align-items:baseline;gap:6px;}
.odo-value small{font-size:14px;color:var(--ink-dim);font-weight:400;}
.odo-sub{display:flex;gap:14px;margin-top:10px;font-size:12px;color:var(--ink-dim);}
.odo-sub b{color:var(--ink);font-weight:600;}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;}
.sync-ok{background:var(--gauge-teal);}
.sync-pending{background:var(--gauge-amber);animation:pulse 1.4s infinite;}
.sync-off{background:var(--ink-dim);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ---- Reminder cards ---- */
.section-title{font-size:13px;font-weight:700;color:var(--ink-dim);letter-spacing:.06em;
  margin:20px 0 10px;text-transform:uppercase;}
.reminder-row{display:flex;overflow-x:auto;gap:10px;padding-bottom:4px;margin:0 -14px;padding-left:14px;padding-right:14px;}
.reminder-card{flex:0 0 auto;min-width:150px;background:var(--panel);border-radius:14px;padding:12px 14px;
  border:1px solid var(--line);border-left:3px solid var(--ink-dim);}
.reminder-card.urgent{border-left-color:var(--gauge-red);background:linear-gradient(180deg,rgba(226,87,76,.09),var(--panel));}
.reminder-card.soon{border-left-color:var(--gauge-amber);}
.reminder-card.ok{border-left-color:var(--gauge-teal);}
.reminder-name{font-size:12.5px;color:var(--ink-dim);}
.reminder-value{font-size:18px;font-weight:700;margin-top:3px;}
.reminder-value.urgent{color:var(--gauge-red);}
.reminder-value.soon{color:var(--gauge-amber);}

/* ---- Timeline / list ---- */
.rec-item{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);
  border-radius:14px;padding:12px 14px;margin-bottom:8px;}
.rec-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;}
.rec-mid{flex:1;min-width:0;}
.rec-cat{font-size:14px;font-weight:600;}
.rec-note{font-size:12px;color:var(--ink-dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rec-meta{font-size:11px;color:var(--ink-dim);margin-top:2px;}
.rec-amt{font-family:var(--mono);font-size:15px;font-weight:700;flex-shrink:0;}
.rec-amt.zero{color:var(--ink-dim);font-weight:400;}
.rec-date{font-size:10px;color:var(--ink-dim);margin-top:2px;text-align:right;}
.day-divider{font-size:11px;color:var(--ink-dim);margin:14px 0 6px;padding-left:2px;}

/* ---- Buttons / inputs ---- */
.btn{border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:600;text-align:center;
  cursor:pointer;font-family:inherit;}
.btn-primary{background:var(--gauge-amber);color:#1a1408;}
.btn-ghost{background:var(--panel-2);color:var(--ink);border:1px solid var(--line);}
.btn-danger{background:rgba(226,87,76,.14);color:var(--gauge-red);border:1px solid rgba(226,87,76,.3);}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;color:var(--ink-dim);margin-bottom:6px;font-weight:600;}
.field input,.field textarea,.field select{width:100%;background:var(--panel-2);border:1px solid var(--line);
  border-radius:10px;padding:12px;color:var(--ink);font-size:16px;font-family:inherit;}
.field textarea{resize:none;min-height:60px;}

.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px;}
.cat-btn{aspect-ratio:1;border-radius:14px;border:1.5px solid var(--line);background:var(--panel);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:11px;
  color:var(--ink-dim);cursor:pointer;}
.cat-btn .em{font-size:20px;}
.cat-btn.active{border-color:var(--gauge-amber);background:rgba(232,163,61,.1);color:var(--ink);}

.quickchip-row{display:flex;gap:8px;margin-bottom:16px;}
.quickchip{flex:1;padding:14px 8px;border-radius:14px;background:var(--panel);border:1px solid var(--line);
  text-align:center;font-size:13px;font-weight:600;color:var(--ink-dim);}
.quickchip .em{font-size:22px;display:block;margin-bottom:4px;}

/* ---- Nav ---- */
.tabbar{display:flex;background:var(--panel);border-top:1px solid var(--line);
  padding:8px 4px calc(env(safe-area-inset-bottom) + 8px);position:sticky;bottom:0;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--ink-dim);
  font-size:10px;padding:4px 0;}
.tab.active{color:var(--gauge-amber);}
.tab .ic{font-size:19px;}

.fab{position:fixed;right:18px;bottom:calc(env(safe-area-inset-bottom) + 78px);width:56px;height:56px;
  border-radius:50%;background:var(--gauge-amber);color:#1a1408;font-size:28px;display:flex;
  align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(232,163,61,.35);z-index:20;border:none;}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;display:flex;align-items:flex-end;}
.modal-sheet{background:var(--bg);width:100%;max-height:88vh;overflow-y:auto;border-radius:20px 20px 0 0;
  padding:18px 16px calc(env(safe-area-inset-bottom) + 20px);}
.modal-handle{width:36px;height:4px;background:var(--line);border-radius:3px;margin:0 auto 14px;}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px;}

.empty{text-align:center;color:var(--ink-dim);padding:40px 20px;font-size:13px;}
.stat-box{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;}
.stat-row{display:flex;justify-content:space-between;font-size:13px;padding:7px 0;border-bottom:1px solid var(--line);}
.stat-row:last-child{border-bottom:none;}
.stat-row b{font-family:var(--mono);}

.issue-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;}
.issue-title{font-weight:700;font-size:14.5px;}
.issue-status{font-size:10.5px;padding:2px 8px;border-radius:6px;font-weight:700;}
.issue-status.open{background:rgba(226,87,76,.14);color:var(--gauge-red);}
.issue-status.resolved{background:rgba(62,207,142,.14);color:var(--gauge-teal);}
.followup{border-left:2px solid var(--line);padding-left:10px;margin-top:8px;font-size:12.5px;color:var(--ink-dim);}

a{color:var(--gauge-blue);}
.logo-splash{font-family:var(--mono);font-weight:800;font-size:15px;letter-spacing:.3em;color:var(--gauge-amber);}

.splash{position:fixed;inset:0;z-index:100;background:#000;overflow:hidden;
  display:flex;align-items:flex-end;justify-content:center;}
.splash-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  transform:scale(1.18);opacity:1;transition:transform 1.6s cubic-bezier(.16,.8,.3,1), opacity 1.1s ease .5s;}
.splash.zoomout .splash-img{transform:scale(1);}
.splash.fadeout{opacity:0;transition:opacity .6s ease;pointer-events:none;}
.splash-shade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(20,24,29,.15) 0%,rgba(20,24,29,.55) 65%,rgba(20,24,29,.94) 100%);}
.splash-brand{position:relative;z-index:2;text-align:center;padding-bottom:14vh;
  opacity:0;transform:translateY(10px);transition:opacity .8s ease .5s, transform .8s ease .5s;}
.splash.zoomout .splash-brand{opacity:1;transform:translateY(0);}
.splash-brand .logo-splash{font-size:20px;}
.splash-brand .tag{font-size:12px;color:var(--ink-dim);margin-top:8px;letter-spacing:.08em;}

.gsi-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
  background:#fff;color:#3c4043;border-radius:12px;padding:13px;font-size:15px;font-weight:600;
  border:1px solid var(--line);cursor:pointer;font-family:inherit;}
.gsi-btn svg{width:18px;height:18px;}
</style>

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef} = React;

/* ============ CATEGORIES ============ */
const CATEGORIES = [
  {id:'fuel', name:'加油', icon:'⛽', color:'#4f8ef7'},
  {id:'maintenance', name:'保養', icon:'🔧', color:'#e8a33d'},
  {id:'repair', name:'維修', icon:'🛠️', color:'#e2574c'},
  {id:'insurance', name:'保險', icon:'🛡️', color:'#8b6ff7'},
  {id:'tax_license', name:'牌照稅', icon:'📋', color:'#4fc3f7'},
  {id:'tax_fuel', name:'燃料稅', icon:'🧾', color:'#3ecf8e'},
  {id:'inspection', name:'驗車', icon:'✅', color:'#8bc34a'},
  {id:'tire', name:'調胎/輪胎', icon:'🛞', color:'#a1785a'},
  {id:'carwash', name:'洗車鍍膜', icon:'🚿', color:'#03a9f4'},
  {id:'etag', name:'etag儲值', icon:'💳', color:'#ff9800'},
  {id:'accessory', name:'配件雜項', icon:'🧩', color:'#c07ae0'},
  {id:'other', name:'其他', icon:'📌', color:'#8b96a5'},
];
const CAT_MAP = Object.fromEntries(CATEGORIES.map(c=>[c.id,c]));

/* ============ FIREBASE ============ */
// 沿用 Venus OS 同一個 Firebase 專案 (attendance-pwa-9fa73)。
// 請把下面 firebaseConfig 換成你 fresh2.html 裡實際使用的那一組設定值。
const firebaseConfig = {
  apiKey: "AIzaSyAqgA9pYvOduWypEE5kxVNlq9fEfrEMV0c",
  authDomain: "attendance-pwa-9fa73.firebaseapp.com",
  projectId: "attendance-pwa-9fa73",
  storageBucket: "attendance-pwa-9fa73.firebasestorage.app",
  messagingSenderId: "231697999145",
  appId: "1:231697999145:web:b92cba42082eb9cc574338"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
try{ auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL); }catch(e){}

async function gSignIn(){
  const provider = new firebase.auth.GoogleAuthProvider();
  try{
    return await auth.signInWithPopup(provider);
  }catch(e){
    if(e.code==='auth/popup-blocked' || e.code==='auth/popup-closed-by-user'){
      return auth.signInWithRedirect(provider);
    }
    throw e;
  }
}

/* ============ STORAGE HELPERS ============ */
function safeGet(key){ try{ return localStorage.getItem(key); }catch(e){ return null; } }
function safeSet(key,val){ try{ localStorage.setItem(key,val); return true; }catch(e){ return false; } }

const DB_NAME='moko-ledger', DB_VER=1;
function openDB(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = (e)=>{
      const idb = e.target.result;
      if(!idb.objectStoreNames.contains('records')) idb.createObjectStore('records',{keyPath:'id'});
      if(!idb.objectStoreNames.contains('issues')) idb.createObjectStore('issues',{keyPath:'id'});
      if(!idb.objectStoreNames.contains('meta')) idb.createObjectStore('meta',{keyPath:'key'});
    };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error);
  });
}
async function idbGetAll(store){
  try{
    const idb = await openDB();
    return await new Promise((resolve,reject)=>{
      const tx = idb.transaction(store,'readonly');
      const r = tx.objectStore(store).getAll();
      r.onsuccess = ()=>resolve(r.result||[]);
      r.onerror = ()=>reject(r.error);
    });
  }catch(e){ return []; }
}
async function idbPut(store,obj){
  try{
    const idb = await openDB();
    await new Promise((resolve,reject)=>{
      const tx = idb.transaction(store,'readwrite');
      tx.objectStore(store).put(obj);
      tx.oncomplete = ()=>resolve();
      tx.onerror = ()=>reject(tx.error);
    });
  }catch(e){}
}

function uid(){ return 'r'+Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function fmtNum(n){ if(n==null||isNaN(n)) return '—'; return Math.round(n).toLocaleString('en-US'); }
function fmtDateShort(d){ if(!d) return ''; const p=d.split('-'); return p.length===3? `${p[1]}/${p[2]}` : d; }
function byDateDesc(a,b){ return (b.date||'').localeCompare(a.date||'') || (b.updatedAt||0)-(a.updatedAt||0); }
function groupByMonth(list){ const g={}; list.forEach(r=>{ const k=(r.date||'').slice(0,7)||'未知'; (g[k]=g[k]||[]).push(r); }); return g; }
function mergeByUpdatedAt(localArr, remoteArr){
  const map = new Map();
  (localArr||[]).forEach(x=>map.set(x.id,x));
  (remoteArr||[]).forEach(x=>{
    const cur = map.get(x.id);
    if(!cur || (x.updatedAt||0) >= (cur.updatedAt||0)) map.set(x.id,x);
  });
  return Array.from(map.values());
}
function addMonths(dateStr, months){
  if(!dateStr) return null;
  const d = new Date(dateStr+'T00:00:00');
  d.setMonth(d.getMonth()+months);
  return d.toISOString().slice(0,10);
}
function daysBetween(d1,d2){ return Math.round((new Date(d2+'T00:00:00') - new Date(d1+'T00:00:00'))/86400000); }

/* ============ DEFAULT META (依你目前的紀錄回推) ============ */
const DEFAULT_META = {
  key:'main',
  initialMileage: 79646,
  purchaseDate: '2021-10-24',
  currentMileage: 122122,
  updatedAt: 0,
  reminders: {
    licenseTax:   {lastDate:'2026-04-01', intervalMonths:12},
    fuelTax:      {lastDate:'2026-06-26', intervalMonths:6},
    inspection:   {lastDate:'2026-07-03', intervalMonths:12},
    maintenance:  {lastDate:'2026-02-27', lastMileage:118767, intervalMonths:12, intervalKm:8000},
    tireRotation: {lastDate:'2026-01-26', lastMileage:116120, intervalKm:6000}
  }
};

/* ============ REMINDER LOGIC ============ */
function computeReminder(name, icon, {lastDate, intervalMonths, lastMileage, intervalKm, currentMileage}){
  const today = todayStr();
  const dueDate = (lastDate && intervalMonths) ? addMonths(lastDate, intervalMonths) : null;
  const dueKm = (lastMileage!=null && intervalKm!=null) ? lastMileage + intervalKm : null;
  const daysLeft = dueDate!=null ? daysBetween(today, dueDate) : null;
  const kmLeft = (dueKm!=null && currentMileage!=null) ? dueKm - currentMileage : null;
  const urgencyOf = (d,k)=>{
    const dU = d!=null ? (d<=14?'urgent':d<=45?'soon':'ok') : 'ok';
    const kU = k!=null ? (k<=500?'urgent':k<=1500?'soon':'ok') : 'ok';
    const order={urgent:2,soon:1,ok:0};
    return order[dU]>=order[kU]? dU : kU;
  };
  return {name, icon, daysLeft, kmLeft, urgency: urgencyOf(daysLeft,kmLeft)};
}
function fmtReminder(daysLeft, kmLeft){
  const parts=[];
  if(daysLeft!=null) parts.push(daysLeft<0? `逾期${-daysLeft}天` : `${daysLeft}天後`);
  if(kmLeft!=null) parts.push(kmLeft<0? `已超${fmtNum(-kmLeft)}km` : `${fmtNum(kmLeft)}km後`);
  return parts.length? parts.join(' / ') : '—';
}
function buildReminders(meta){
  const r = meta.reminders, cm = meta.currentMileage;
  const list = [
    computeReminder('牌照稅','📋', {lastDate:r.licenseTax.lastDate, intervalMonths:r.licenseTax.intervalMonths}),
    computeReminder('燃料稅','🧾', {lastDate:r.fuelTax.lastDate, intervalMonths:r.fuelTax.intervalMonths}),
    computeReminder('驗車','✅', {lastDate:r.inspection.lastDate, intervalMonths:r.inspection.intervalMonths}),
    computeReminder('保養','🔧', {lastDate:r.maintenance.lastDate, intervalMonths:r.maintenance.intervalMonths, lastMileage:r.maintenance.lastMileage, intervalKm:r.maintenance.intervalKm, currentMileage:cm}),
    computeReminder('調胎','🛞', {lastMileage:r.tireRotation.lastMileage, intervalKm:r.tireRotation.intervalKm, currentMileage:cm}),
  ];
  const order={urgent:0,soon:1,ok:2};
  return list.sort((a,b)=>order[a.urgency]-order[b.urgency]);
}
function applyRecordToMeta(meta, rec){
  let changed = false;
  const R = {...meta.reminders};
  let currentMileage = meta.currentMileage;
  if(rec.mileage!=null && rec.mileage > (currentMileage||0)){ currentMileage = rec.mileage; changed = true; }
  if(rec.category==='tax_license'){ R.licenseTax = {...R.licenseTax, lastDate: rec.date}; changed = true; }
  if(rec.category==='tax_fuel'){ R.fuelTax = {...R.fuelTax, lastDate: rec.date}; changed = true; }
  if(rec.category==='inspection'){ R.inspection = {...R.inspection, lastDate: rec.date}; changed = true; }
  if(rec.category==='maintenance'){ R.maintenance = {...R.maintenance, lastDate: rec.date, lastMileage: rec.mileage!=null? rec.mileage : R.maintenance.lastMileage}; changed = true; }
  if(rec.category==='tire'){ R.tireRotation = {...R.tireRotation, lastDate: rec.date, lastMileage: rec.mileage!=null? rec.mileage : R.tireRotation.lastMileage}; changed = true; }
  if(!changed) return meta;
  return {...meta, currentMileage, reminders:R, updatedAt: Date.now()};
}

/* ============ SMALL UI PIECES ============ */
function TabBtn({icon,label,active,onClick}){
  return <div className={"tab"+(active?' active':'')} onClick={onClick}>
    <div className="ic">{icon}</div><div>{label}</div>
  </div>;
}
function FilterChip({active,label,onClick}){
  return <div onClick={onClick} style={{
    flex:'0 0 auto',padding:'8px 13px',borderRadius:20,fontSize:12.5,whiteSpace:'nowrap',
    background: active? 'rgba(232,163,61,.16)':'var(--panel)',
    border:'1px solid '+(active?'var(--gauge-amber)':'var(--line)'),
    color: active? 'var(--ink)':'var(--ink-dim)'
  }}>{label}</div>;
}
function RecordRow({rec,onClick}){
  const cat = CAT_MAP[rec.category] || CAT_MAP.other;
  return <div className="rec-item" onClick={onClick}>
    <div className="rec-icon" style={{background:cat.color+'26',color:cat.color}}>{cat.icon}</div>
    <div className="rec-mid">
      <div className="rec-cat">{cat.name}{rec.mileage!=null? ` · ${fmtNum(rec.mileage)}km` : ''}</div>
      {rec.note && <div className="rec-note">{rec.note}</div>}
    </div>
    <div>
      <div className={"rec-amt"+(rec.amount? '':' zero')}>{rec.amount? '$'+fmtNum(rec.amount) : '—'}</div>
      <div className="rec-date">{fmtDateShort(rec.date)}</div>
    </div>
  </div>;
}

/* ============ LOGIN ============ */
function LoginScreen(){
  const [err,setErr] = useState('');
  const [busy,setBusy] = useState(false);
  async function submit(){
    setBusy(true); setErr('');
    try{ await gSignIn(); }
    catch(e){ setErr(e.message||'登入失敗'); }
    setBusy(false);

/* ============ APP ============ */
function App(){
  const [user,setUser] = useState(null);
  const [authLoading,setAuthLoading] = useState(true);
  const [records,setRecords] = useState([]);
  const [issues,setIssues] = useState([]);
  const [meta,setMeta] = useState(DEFAULT_META);
  const [tab,setTab] = useState('dashboard');
  const [online,setOnline] = useState(navigator.onLine);
  const [syncState,setSyncState] = useState('ok');
  const [splashPhase,setSplashPhase] = useState('');
  const [showSplash,setShowSplash] = useState(true);

  const [showAdd,setShowAdd] = useState(false);
  const [editingRecord,setEditingRecord] = useState(null);
  const [addPrefill,setAddPrefill] = useState(null);
  const [showIssueAdd,setShowIssueAdd] = useState(false);
  const [followupTarget,setFollowupTarget] = useState(null);

  useEffect(()=>{
    const t1 = setTimeout(()=>setSplashPhase('zoomout'), 60);
    const t2 = setTimeout(()=>setSplashPhase('zoomout fadeout'), 1700);
    const t3 = setTimeout(()=>setShowSplash(false), 2300);
    return ()=>{ clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
  },[]);

  useEffect(()=>{
    auth.getRedirectResult().catch(e=>console.error('redirect result error',e));
  },[]);

  useEffect(()=>{
    const onOnline=()=>{ setOnline(true); if(user) pullFirestore(user.uid); };
    const onOffline=()=>setOnline(false);
    window.addEventListener('online',onOnline);
    window.addEventListener('offline',onOffline);
    return ()=>{ window.removeEventListener('online',onOnline); window.removeEventListener('offline',onOffline); };
  },[user]);

  useEffect(()=>{
    const unsub = auth.onAuthStateChanged(async (u)=>{
      setUser(u);
      setAuthLoading(false);
      if(u) await loadAll(u.uid);
    });
    return unsub;
  },[]);

  async function loadAll(uidVal){
    setSyncState('pending');
    try{
      let localRecords = await idbGetAll('records');
      let localIssues = await idbGetAll('issues');
      let metaRows = await idbGetAll('meta');
      let localMeta = metaRows.find(x=>x.key==='main');
      if(!localMeta){
        const raw = safeGet('moko:meta');
        if(raw){ try{ localMeta = JSON.parse(raw); }catch(e){} }
      }
      if(!localMeta) localMeta = DEFAULT_META;
      if((!localRecords || localRecords.length===0)){
        const raw = safeGet('moko:records');
        if(raw){ try{ localRecords = JSON.parse(raw); }catch(e){ localRecords=[]; } }
      }
      if((!localIssues || localIssues.length===0)){
        const raw = safeGet('moko:issues');
        if(raw){ try{ localIssues = JSON.parse(raw); }catch(e){ localIssues=[]; } }
      }
      setRecords((localRecords||[]).slice().sort(byDateDesc));
      setIssues((localIssues||[]).slice().sort(byDateDesc));
      setMeta(localMeta);
      if(navigator.onLine) await pullFirestore(uidVal, localRecords, localIssues, localMeta);
      else setSyncState('off');
    }catch(e){
      console.error(e); setSyncState('off');
    }
  }

  async function pullFirestore(uidVal, curRecords, curIssues, curMeta){
    try{
      const uu = uidVal || (auth.currentUser && auth.currentUser.uid);
      if(!uu) return;
      curRecords = curRecords || records;
      curIssues = curIssues || issues;
      curMeta = curMeta || meta;
      const recSnap = await db.collection('car-expense').doc(uu).collection('records').get();
      const remoteRecords = recSnap.docs.map(d=>d.data());
      const issueSnap = await db.collection('car-expense').doc(uu).collection('issues').get();
      const remoteIssues = issueSnap.docs.map(d=>d.data());
      const metaDoc = await db.collection('car-expense').doc(uu).get();
      const remoteMeta = (metaDoc.exists && metaDoc.data().meta) ? metaDoc.data().meta : null;

      const mergedRecords = mergeByUpdatedAt(curRecords, remoteRecords);
      const mergedIssues = mergeByUpdatedAt(curIssues, remoteIssues);
      const mergedMeta = (remoteMeta && (remoteMeta.updatedAt||0) > (curMeta.updatedAt||0)) ? remoteMeta : curMeta;

      for(const r of mergedRecords) await idbPut('records', r);
      for(const i of mergedIssues) await idbPut('issues', i);
      await idbPut('meta', {key:'main', ...mergedMeta});
      safeSet('moko:records', JSON.stringify(mergedRecords));
      safeSet('moko:issues', JSON.stringify(mergedIssues));
      safeSet('moko:meta', JSON.stringify(mergedMeta));

      setRecords(mergedRecords.slice().sort(byDateDesc));
      setIssues(mergedIssues.slice().sort(byDateDesc));
      setMeta(mergedMeta);
      setSyncState('ok');
    }catch(e){
      console.error('pull failed', e); setSyncState('off');
    }
  }

  async function persistRecordsLocal(){
    const all = await idbGetAll('records');
    safeSet('moko:records', JSON.stringify(all));
  }
  async function persistIssuesLocal(){
    const all = await idbGetAll('issues');
    safeSet('moko:issues', JSON.stringify(all));
  }

  async function pushToFirestore(kind, obj){
    try{
      const uu = auth.currentUser && auth.currentUser.uid;
      if(!uu || !navigator.onLine) return;
      if(kind==='record') await db.collection('car-expense').doc(uu).collection('records').doc(obj.id).set(obj);
      if(kind==='issue') await db.collection('car-expense').doc(uu).collection('issues').doc(obj.id).set(obj);
      if(kind==='meta') await db.collection('car-expense').doc(uu).set({meta:obj},{merge:true});
      setSyncState('ok');
    }catch(e){
      console.error('push failed',e); setSyncState('pending');
    }
  }

  async function saveMeta(newMeta){
    const stamped = {...newMeta, updatedAt: Date.now()};
    setMeta(stamped);
    await idbPut('meta',{key:'main', ...stamped});
    safeSet('moko:meta', JSON.stringify(stamped));
    pushToFirestore('meta', stamped);
  }

  async function handleSaveRecord(data){
    const now = Date.now();
    const full = {...data, id: data.id || uid(), updatedAt: now, deleted:false};
    setRecords(prev=>{
      const idx = prev.findIndex(r=>r.id===full.id);
      const next = idx>=0 ? prev.map(r=>r.id===full.id? full : r) : [full,...prev];
      return next.sort(byDateDesc);
    });
    await idbPut('records', full);
    await persistRecordsLocal();
    const newMeta = applyRecordToMeta(meta, full);
    if(newMeta !== meta){
      setMeta(newMeta);
      await idbPut('meta',{key:'main', ...newMeta});
      safeSet('moko:meta', JSON.stringify(newMeta));
      pushToFirestore('meta', newMeta);
    }
    pushToFirestore('record', full);
    setShowAdd(false); setEditingRecord(null); setAddPrefill(null);
  }

  async function handleDeleteRecord(rec){
    const full = {...rec, deleted:true, updatedAt: Date.now()};
    setRecords(prev=>prev.map(r=>r.id===full.id? full : r));
    await idbPut('records', full);
    await persistRecordsLocal();
    pushToFirestore('record', full);
    setShowAdd(false); setEditingRecord(null); setAddPrefill(null);
  }

  async function handleSaveIssue(data){
    const now = Date.now();
    const full = {...data, id: uid(), status:'open', followups:[], createdAt:now, updatedAt:now, deleted:false};
    setIssues(prev=>[full,...prev].sort(byDateDesc));
    await idbPut('issues', full);
    await persistIssuesLocal();
    pushToFirestore('issue', full);
    setShowIssueAdd(false);
  }
  async function toggleIssueStatus(issue){
    const full = {...issue, status: issue.status==='open'?'resolved':'open', updatedAt: Date.now()};
    setIssues(prev=>prev.map(i=>i.id===full.id? full : i));
    await idbPut('issues', full);
    await persistIssuesLocal();
    pushToFirestore('issue', full);
  }
  async function handleAddFollowup(issue, data){
    const full = {...issue, followups:[...(issue.followups||[]), {...data, createdAt:Date.now()}], updatedAt: Date.now()};
    setIssues(prev=>prev.map(i=>i.id===full.id? full : i));
    await idbPut('issues', full);
    await persistIssuesLocal();
    pushToFirestore('issue', full);
    setFollowupTarget(null);
  }

  if(authLoading) return <>{showSplash && <SplashScreen phase={splashPhase}/>}</>;
  if(!user) return <>{showSplash && <SplashScreen phase={splashPhase}/>}<LoginScreen/></>;

  const addInitial = editingRecord || addPrefill;

  return <>
    {showSplash && <SplashScreen phase={splashPhase}/>}
    <div className="screen">
      {tab==='dashboard' && <Dashboard meta={meta} records={records} issues={issues} online={online} syncState={syncState}
        onQuickAdd={cat=>{ setEditingRecord(null); setAddPrefill({category:cat}); setShowAdd(true); }}
        onOpenAdd={()=>{ setEditingRecord(null); setAddPrefill(null); setShowAdd(true); }}
        onGoTab={setTab}/>}
      {tab==='timeline' && <Timeline records={records} onEdit={r=>{ setEditingRecord(r); setShowAdd(true); }}/>}
      {tab==='issues' && <IssuesScreen issues={issues}
        onAddIssue={()=>setShowIssueAdd(true)}
        onAddFollowup={i=>setFollowupTarget(i)}
        onToggleStatus={toggleIssueStatus}/>}
      {tab==='stats' && <StatsScreen records={records}/>}
      {tab==='settings' && <SettingsScreen meta={meta} onSaveMeta={saveMeta} onLogout={()=>auth.signOut()} records={records} issues={issues}/>}
    </div>

    {tab!=='settings' && <button className="fab" onClick={()=>{ setEditingRecord(null); setAddPrefill(null); setShowAdd(true); }}>+</button>}

    <div className="tabbar">
      <TabBtn icon="🏠" label="首頁" active={tab==='dashboard'} onClick={()=>setTab('dashboard')}/>
      <TabBtn icon="📜" label="紀錄" active={tab==='timeline'} onClick={()=>setTab('timeline')}/>
      <TabBtn icon="⚠️" label="事件" active={tab==='issues'} onClick={()=>setTab('issues')}/>
      <TabBtn icon="📊" label="統計" active={tab==='stats'} onClick={()=>setTab('stats')}/>
      <TabBtn icon="⚙️" label="設定" active={tab==='settings'} onClick={()=>setTab('settings')}/>
    </div>

    {showAdd && <AddModal initial={addInitial} onSave={handleSaveRecord} onDelete={handleDeleteRecord}
      onClose={()=>{ setShowAdd(false); setEditingRecord(null); setAddPrefill(null); }}/>}
    {showIssueAdd && <IssueModal onSave={handleSaveIssue} onClose={()=>setShowIssueAdd(false)}/>}
    {followupTarget && <FollowupModal issue={followupTarget} onSave={data=>handleAddFollowup(followupTarget,data)} onClose={()=>setFollowupTarget(null)}/>}
  </>;
}

ReactDOM.render(<App/>, document.getElementById('root'));

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js').catch(e=>console.error('SW register failed',e));
  });
}
</script>
</body>
</html>
